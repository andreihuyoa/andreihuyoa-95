    <script>
      (() => {
        const requestedMode = new URLSearchParams(window.location.search).get(
          "mode",
        );
        const savedMode = window.localStorage.getItem("design-mode");
        const mode =
          requestedMode === "website" || requestedMode === "os"
            ? requestedMode
            : savedMode === "website"
              ? "website"
              : "os";

        document.documentElement.dataset.mode = mode;
      })();
    </script>
